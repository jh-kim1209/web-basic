<html lang="ko">

<head>
    <title>Todo List</title>
</head>

<body>

    <div>
        <form id="todoForm">
            <input type="text" id="todoStr" placeholder="Todo 내용 입력">
            <button type="submit" id="addTodoButton">add</button>
        </form>
    </div>

    <div>
        <ul id="todoList" style="list-style: none;"></ul>
    </div>

    <script>
        let todoList = [];
        let todoId = 1;

        const todoForm = document.getElementById("todoForm");
        const todoStr = document.getElementById("todoStr");

        const renderTodoList = () => {
            const tagTodoUl = todoList.map(({ id, todoItem, done }) => `
                <li>
                    <input type="checkbox" onclick="toggleTodoDone(${id})" ${done ? 'checked' : ''}>
                    <span style="${done ? 'text-decoration: line-through;' : ''}">${todoItem}</span>
                    <button onclick="deleteTodo(${id})">삭제</button>
                </li>
            `).join("");

            document.getElementById('todoList').innerHTML = tagTodoUl;
        }

        const addTodo = (str) => {
            if (str === null || str === "") {
                alert("할일을 입력해주세요.");
                todoStr.focus();
                return;
            }

            let addTodoItem = { id: todoId, todoItem: str, done: false };
            todoList = [...todoList, addTodoItem];

            todoId++;
            todoStr.value = "";
            todoStr.focus();
            renderTodoList();

            localStorage.setItem("todoList", JSON.stringify(todoList));
        }

        todoForm.addEventListener("submit", (event) => {
            event.preventDefault();
            addTodo(todoStr.value);
        });

        const toggleTodoDone = (id) => {
            todoList = todoList.map(item => item.id === id ? { ...item, done: !item.done } : item);
            renderTodoList();
            localStorage.setItem("todoList", JSON.stringify(todoList));
        }

        const deleteTodo = (id) => {
            todoList = todoList.filter(item => item.id !== id);
            renderTodoList();
            localStorage.setItem("todoList", JSON.stringify(todoList));
        }

        const loadTodoList = () => {
            todoList = JSON.parse(localStorage.getItem("todoList")) ?? [];

            if (todoList.length > 0) {
                const maxId = Math.max(...todoList.map(item => item.id));
                todoId = maxId + 1;
            }
            renderTodoList();
        };

        loadTodoList();

    </script>
</body>

</html>
