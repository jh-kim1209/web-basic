<html lang="ko">

<head>
    <title>Todo List</title>
</head>

<body>

    <div>
        <form id="add">
            <input type="text" id="todotext" placeholder="Todo 내용 입력">
            <button type="button" onclick="addTodo(document.getElementById('todotext').value)">add</button>
        </form>
    </div>

    <div>
        <ul id="todoList" style="list-style: none;"></ul>
    </div>

    <script>
        let todoId = 1;
        let todoList = [];

        function addTodo(text) {
            if (text === null || text === "") {
                alert("할일을 입력해주세요.");
                document.getElementById('todotext').focus();
                return;
            }

            todoList.push({
                id: todoId,
                text,
                done: false
            });

            todoId++;
            document.getElementById('todotext').value = "";
            document.getElementById('todotext').focus();
            renderTodoList();
        }

        function renderTodoList() {
            const tagTodoUl = todoList.map(todoItem => `
                <li>
                    <input type="checkbox" onclick="toggleTodoDone(${todoItem.id})" ${todoItem.done ? 'checked' : ''}>
                    <span style="${todoItem.done ? 'text-decoration: line-through;' : ''}">${todoItem.text}</span>
                    <button onclick="deleteTodo(${todoItem.id})">삭제</button>
                </li>
            `).join("");

            document.getElementById('todoList').innerHTML = tagTodoUl;
        }

        function toggleTodoDone(id) {
            const index = todoList.findIndex(todoItem => todoItem.id === id);

            if (index !== -1) {
                todoList[index].done = !todoList[index].done;
            }
            renderTodoList();
        }

        function deleteTodo(id) {
            todoList = todoList.filter(item => item.id !== id);
            renderTodoList();
        }
    </script>
</body>

</html>
